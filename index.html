<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ばくだんをわけろ！</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
  html,body{margin:0;padding:0;height:100%;background:#222;overflow:hidden;font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;color:#fff;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{background:#000;touch-action:none;display:block;box-shadow:0 0 24px rgba(0,0,0,.6);}
  .hidden{display:none !important;}
  .small{font-size:12px;opacity:.7;}
  /* ホーム画面 */
  #home{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
        background:linear-gradient(180deg,#2c2c3a 0%,#1a1a26 100%);z-index:10;
        padding:18px 16px;overflow-y:auto;}
  #home h1{font-size:26px;margin:6px 0 10px;letter-spacing:.05em;color:#ffd24a;text-shadow:0 2px 0 #000;}
  #home .stats{display:flex;gap:14px;margin:6px 0 10px;font-size:14px;}
  #home .stats .pill{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.15);
                     border-radius:16px;padding:6px 12px;}
  #home .stats b{color:#ffcc33;margin-left:4px;}
  #home .shop{width:100%;max-width:320px;margin:8px 0;}
  #home .shop h3{margin:8px 0;font-size:14px;text-align:center;opacity:.7;letter-spacing:.2em;}
  #home .shopItem{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
                  border-radius:12px;padding:10px 12px;margin-bottom:8px;}
  #home .shopItem .row{display:flex;align-items:center;gap:10px;}
  #home .shopItem .icon{width:42px;height:42px;border-radius:8px;background:#3a3a48;
                        display:flex;align-items:center;justify-content:center;font-size:22px;}
  #home .shopItem .info{flex:1;min-width:0;}
  #home .shopItem .name{font-weight:bold;font-size:14px;}
  #home .shopItem .desc{font-size:11px;opacity:.7;}
  #home .shopItem .own{font-size:11px;color:#ffd24a;}
  #home .shopItem button{margin-top:8px;width:100%;padding:8px;border:none;border-radius:18px;
                         background:#ffcc33;color:#222;font-weight:bold;cursor:pointer;font-size:13px;}
  #home .shopItem button:disabled{background:#444;color:#888;cursor:not-allowed;}
  #home #startBtn{margin-top:12px;padding:14px 36px;font-size:20px;border:none;border-radius:30px;
                  background:#ff6644;color:#fff;font-weight:bold;cursor:pointer;
                  box-shadow:0 4px 0 #993322;}
  #home #startBtn:active{transform:translateY(2px);box-shadow:0 2px 0 #993322;}
  #home .history{width:100%;max-width:320px;margin-top:12px;font-size:12px;}
  #home .history h3{margin:6px 0;opacity:.7;letter-spacing:.2em;text-align:center;}
  #home .history ol{list-style:none;padding:0;margin:0;background:rgba(0,0,0,.25);
                    border-radius:10px;padding:8px 12px;}
  #home .history li{padding:3px 0;display:flex;justify-content:space-between;}
  #home .history li.empty{justify-content:center;opacity:.4;}
  /* デイリーログイン */
  #daily{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
         background:rgba(0,0,0,.78);z-index:20;}
  #daily .box{background:#2a2a36;border:2px solid #ffcc33;border-radius:18px;padding:24px 30px;
              text-align:center;max-width:280px;}
  #daily h2{margin:0 0 10px;color:#ffd24a;}
  #daily .day{font-size:13px;opacity:.7;margin:4px 0;}
  #daily .amt{font-size:32px;font-weight:bold;color:#ffd24a;margin:8px 0;}
  #daily .extra{color:#ffaa66;font-size:13px;margin-bottom:6px;}
  #daily button{margin-top:14px;padding:10px 28px;border:none;border-radius:20px;
                background:#ffcc33;color:#222;font-weight:bold;cursor:pointer;font-size:15px;}
  /* ゲームオーバー画面 */
  #gameover{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
            flex-direction:column;background:rgba(0,0,0,.78);z-index:10;text-align:center;padding:24px;}
  #gameover h1{font-size:32px;margin:0 0 10px;color:#ff6644;text-shadow:0 2px 0 #000;}
  #gameover .big{font-size:40px;font-weight:bold;color:#ffd24a;margin:6px 0;}
  #gameover .gain{font-size:16px;margin:4px 0;color:#ffaa66;}
  #gameover button{margin-top:18px;padding:12px 28px;font-size:16px;border:none;border-radius:24px;
                   background:#ffcc33;color:#222;font-weight:bold;cursor:pointer;}
</style>
</head>
<body>
<div id="stage"><canvas id="cv" width="360" height="640"></canvas></div>

<!-- ホーム画面 -->
<div id="home">
  <h1>ばくだんをわけろ！</h1>
  <div class="stats">
    <div class="pill">🏆 さいこう <b id="bestVal">0</b></div>
    <div class="pill">🪙 コイン <b id="coinsVal">0</b></div>
  </div>
  <div class="shop">
    <h3>ショップ</h3>
    <div class="shopItem" data-item="zenmetsu">
      <div class="row">
        <div class="icon">💥</div>
        <div class="info">
          <div class="name">ぜんめつ</div>
          <div class="desc">場のばくだんを いっせいに けす</div>
          <div class="own">もちもの: <span class="ownCount">0</span> こ</div>
        </div>
      </div>
      <button class="buyBtn">50 🪙 で 1こ かう</button>
    </div>
  </div>
  <button id="startBtn">スタート</button>
  <p class="small" style="margin-top:8px;opacity:.6;">ドラッグで うごかす／まちがえると ばくはつ／ちゃいろは さわるな！</p>
  <div class="history">
    <h3>さいきんのスコア</h3>
    <ol id="historyList"><li class="empty">まだ プレイ なし</li></ol>
  </div>
</div>

<!-- デイリーログイン -->
<div id="daily" class="hidden">
  <div class="box">
    <h2>🎁 ログインボーナス</h2>
    <div class="day">れんぞく <span id="dailyStreak">1</span> にちめ</div>
    <div class="amt">+ <span id="dailyCoins">0</span> 🪙</div>
    <div class="extra hidden" id="dailyBonus">＋ ぜんめつ ×1</div>
    <button id="dailyOk">うけとる</button>
  </div>
</div>

<!-- ゲームオーバー画面 -->
<div id="gameover" class="hidden">
  <h1>ばくはつ！</h1>
  <p>スコア</p>
  <div class="big" id="goScore">0</div>
  <p class="gain">+ <b id="goCoins">0</b> コイン</p>
  <p class="small" id="goBest"></p>
  <button id="goHome">ホームへ</button>
</div>
<script>
(() => {
'use strict';

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const homeEl = document.getElementById('home');
const gameoverEl = document.getElementById('gameover');
const startBtn = document.getElementById('startBtn');
const goHomeBtn = document.getElementById('goHome');
const bestValEl = document.getElementById('bestVal');
const coinsValEl = document.getElementById('coinsVal');
const ownCountEl = homeEl.querySelector('.shopItem[data-item="zenmetsu"] .ownCount');
const buyBtnEl = homeEl.querySelector('.shopItem[data-item="zenmetsu"] .buyBtn');
const historyListEl = document.getElementById('historyList');
const goScoreEl = document.getElementById('goScore');
const goCoinsEl = document.getElementById('goCoins');
const goBestEl = document.getElementById('goBest');
const W = cv.width, H = cv.height;

// 永続データ
const ZEN_PRICE = 50;
const SAVE = {
  load(){
    return {
      best: +localStorage.getItem('bomb_best') || 0,
      coins: +localStorage.getItem('bomb_coins') || 0,
      owned: JSON.parse(localStorage.getItem('bomb_owned') || '{"zenmetsu":1}'),
      history: JSON.parse(localStorage.getItem('bomb_history') || '[]'),
    };
  },
  save(s){
    localStorage.setItem('bomb_best', s.best|0);
    localStorage.setItem('bomb_coins', s.coins|0);
    localStorage.setItem('bomb_owned', JSON.stringify(s.owned));
    localStorage.setItem('bomb_history', JSON.stringify(s.history));
  },
};
const save = SAVE.load();

// レイアウト
const HUD_H = 36;
const FLOOR = {x:6, y:HUD_H+8, w:W-12, h:328};   // 徘徊エリア（広め）
const ZONE_Y = FLOOR.y + FLOOR.h + 8;
const ZONE_H = H - ZONE_Y - 8;
const RED = {x:8,         y:ZONE_Y, w:W/2-12, h:ZONE_H, color:'#b8324a', edge:'#ff8090'}; // 左：あか
const BLK = {x:W/2+4,     y:ZONE_Y, w:W/2-12, h:ZONE_H, color:'#1c1c22', edge:'#666680'}; // 右：くろ

// アイテム枠（右下にオーバーレイ）
const ITEM_SIZE = 56, ITEM_MARGIN = 8;
const ITEM = {x: W - ITEM_SIZE - ITEM_MARGIN, y: H - ITEM_SIZE - ITEM_MARGIN, w: ITEM_SIZE, h: ITEM_SIZE};

// state
const state = {
  bombs: [],
  score: 0,
  spawnTimer: 0,
  spawnInterval: 1900,
  level: 1,
  running: false,
  dragging: null,
  dragOffset: {x:0,y:0},
  shake: 0,
  flash: 0,
  flashColor: '#fff',
  particles: [],
  gameOver: false,
  itemCount: 1,
  itemMax: 3,
  scoreSinceItem: 0,
  lastPointer: {x:0, y:0, active:false},
  combo: 0,
  comboTimer: 0,
  scoreFloaters: [],
};

const COMBO_TIMEOUT = 4000; // ms 連続正解の猶予
function comboMul(c){
  if(c >= 20) return 10;
  if(c >= 10) return 5;
  if(c >= 6)  return 3;
  if(c >= 3)  return 2;
  return 1;
}

// ホーム画面の表示更新
function refreshHome(){
  bestValEl.textContent = save.best;
  coinsValEl.textContent = save.coins;
  ownCountEl.textContent = (save.owned.zenmetsu||0);
  buyBtnEl.disabled = save.coins < ZEN_PRICE;
  buyBtnEl.textContent = (save.coins < ZEN_PRICE)
    ? `コインが ${ZEN_PRICE} こ ひつよう`
    : `${ZEN_PRICE} 🪙 で 1こ かう`;
  // 履歴
  if(save.history.length === 0){
    historyListEl.innerHTML = '<li class="empty">まだ プレイ なし</li>';
  } else {
    historyListEl.innerHTML = save.history.slice(0,10).map((h,i)=>
      `<li><span>#${i+1}</span><span>${h.score} てん</span></li>`
    ).join('');
  }
}

function showHome(){
  homeEl.classList.remove('hidden');
  gameoverEl.classList.add('hidden');
  refreshHome();
}
function hideHome(){
  homeEl.classList.add('hidden');
}

// ========= ばくだん =========
class Bomb{
  constructor(type, side='top', pos=0.5){
    this.type = type;            // 'black' | 'red' | 'brown' (brown=触ると即終了)
    this.side = side;            // 'left' | 'right' | 'top'
    this.r = 20;
    if(side==='left'){
      this.x = -24;
      this.y = FLOOR.y + 16 + (FLOOR.h-32) * pos;
    } else if(side==='right'){
      this.x = W + 24;
      this.y = FLOOR.y + 16 + (FLOOR.h-32) * pos;
    } else { // top
      this.x = FLOOR.x + 16 + (FLOOR.w-32) * pos;
      this.y = FLOOR.y + 4;   // 投入口から出てくる位置（低め）
    }
    this.state = 'enter';        // enter | wander | drag | placed
    this.zone = null;            // 'red' | 'black' (placed時)
    // レベルで導火線が短くなる：Lv1で9.5秒 → 上限で5秒
    // 茶ばくだんは触らなければ安全。一定時間で去る。
    this.fuseTime = (type==='brown')
      ? 7000
      : Math.max(5000, 9500 - (state.level-1) * 300);
    this.fuseLeft = this.fuseTime;
    this.targetX = 0;
    this.targetY = 0;
    this.wanderTimer = 0;
    this.wiggle = Math.random()*Math.PI*2;
    this.bobPhase = Math.random()*Math.PI*2;
    this.facing = 1;
    this._dead = false;
    this._exploded = false;
    // ばくだん毎の個性
    this.speedMul = 0.55 + Math.random()*1.05;          // 0.55〜1.6倍速
    this.wanderMinT = 350 + Math.random()*800;
    this.wanderMaxT = this.wanderMinT + 500 + Math.random()*1700;
    this.idleChance = 0.10 + Math.random()*0.30;        // 10〜40%でその場休憩
    this.bobAmp    = 1.0 + Math.random()*1.6;           // 上下ゆれ幅
    // 気まぐれダッシュ（spawnBombで有効化）
    this.dashy = false;
    this.dashing = false;
    this.dashCooldown = 1800 + Math.random()*2000;
    this.dashLeft = 0;
    this.dashVx = 0; this.dashVy = 0;
    // 茶ばくだん用：上を通った指の総移動距離を蓄積（cm感覚）
    this.swipeAccum = 0;     // px単位
    this.hitFlash = 0;       // ヒット直後の閃光
  }
  pickTarget(area){
    if(Math.random() < this.idleChance){
      // その場で休憩
      this.targetX = this.x;
      this.targetY = this.y;
      this.wanderTimer = 250 + Math.random()*700;
      return;
    }
    // ターゲット範囲：近距離 or 遠距離をランダム選択（歩き方の多様化）
    const span = Math.random() < 0.4 ? 0.4 : 1.0;       // 短距離 or 自由移動
    const cx = this.x, cy = this.y;
    const halfW = (area.w-32)*0.5*span;
    const halfH = (area.h-32)*0.5*span;
    let tx = cx + (Math.random()*2-1)*halfW;
    let ty = cy + (Math.random()*2-1)*halfH;
    // エリア内にクランプ
    tx = Math.max(area.x+16, Math.min(area.x+area.w-16, tx));
    ty = Math.max(area.y+16, Math.min(area.y+area.h-16, ty));
    this.targetX = tx;
    this.targetY = ty;
    this.wanderTimer = this.wanderMinT + Math.random()*(this.wanderMaxT - this.wanderMinT);
  }
  walkTo(dt, baseSpeed){
    const dx = this.targetX - this.x, dy = this.targetY - this.y;
    const d = Math.hypot(dx,dy);
    if(d > 1){
      const sp = baseSpeed * this.speedMul * dt;
      this.x += dx/d * Math.min(sp, d);
      this.y += dy/d * Math.min(sp, d);
      this.facing = dx >= 0 ? 1 : -1;
    }
  }
  update(dt){
    this.wiggle += dt*0.005;
    this.bobPhase += dt*0.01;
    if(this.hitFlash > 0) this.hitFlash = Math.max(0, this.hitFlash - dt*0.003);
    if(this.state==='enter'){
      const sp = dt*0.05;
      let arrived = false;
      if(this.side==='left'){
        this.x += sp; this.facing = 1;
        if(this.x > FLOOR.x + 24) arrived = true;
      } else if(this.side==='right'){
        this.x -= sp; this.facing = -1;
        if(this.x < FLOOR.x + FLOOR.w - 24) arrived = true;
      } else { // top
        this.y += sp;
        if(this.y > FLOOR.y + 24) arrived = true;
      }
      this.fuseLeft -= dt;
      if(arrived){
        this.state = 'wander';
        this.pickTarget(FLOOR);
      }
    }
    else if(this.state==='wander'){
      // 茶は反対側へ一直線に抜ける（うろうろしない）
      if(this.type==='brown'){
        if(!this.exitSet){
          if(this.side==='top'){
            this.exitX = this.x;
            this.exitY = FLOOR.y + FLOOR.h + 60;
          } else if(this.side==='left'){
            this.exitX = W + 40;
            this.exitY = this.y;
          } else { // right
            this.exitX = -40;
            this.exitY = this.y;
          }
          this.exitSet = true;
        }
        const dx = this.exitX - this.x, dy = this.exitY - this.y;
        const d = Math.hypot(dx, dy);
        const sp = 0.075 * this.speedMul * dt;
        if(d > 1){
          this.x += dx/d * Math.min(sp, d);
          this.y += dy/d * Math.min(sp, d);
          this.facing = dx >= 0 ? 1 : -1;
        }
        if(this.x < -36 || this.x > W+36 || this.y < -36 || this.y > H+36){
          this._dead = true;
        }
        this.fuseLeft -= dt;
        return;
      }
      // 気まぐれダッシュ（dashy個体）
      if(this.dashy){
        if(this.dashing){
          this.x += this.dashVx * dt;
          this.y += this.dashVy * dt;
          this.facing = this.dashVx >= 0 ? 1 : -1;
          this.x = Math.max(FLOOR.x+16, Math.min(FLOOR.x+FLOOR.w-16, this.x));
          this.y = Math.max(FLOOR.y+16, Math.min(FLOOR.y+FLOOR.h-16, this.y));
          this.dashLeft -= dt;
          if(this.dashLeft <= 0){
            this.dashing = false;
            this.dashCooldown = 1800 + Math.random()*2200;
            this.pickTarget(FLOOR);
          }
          this.fuseLeft -= dt;
          return;
        }
        this.dashCooldown -= dt;
        if(this.dashCooldown <= 0){
          this.dashing = true;
          const a = Math.random()*Math.PI*2;
          const sp = 0.36 + Math.random()*0.18;
          this.dashVx = Math.cos(a)*sp;
          this.dashVy = Math.sin(a)*sp;
          this.dashLeft = 220 + Math.random()*220;
          this.fuseLeft -= dt;
          return;
        }
      }
      this.wanderTimer -= dt;
      if(this.wanderTimer<=0) this.pickTarget(FLOOR);
      this.walkTo(dt, 0.04);
      this.fuseLeft -= dt;
    }
    else if(this.state==='placed'){
      this.wanderTimer -= dt;
      if(this.wanderTimer<=0) this.pickTarget(this.zone==='red' ? RED : BLK);
      this.walkTo(dt, 0.025);
      // 安全：fuseは進まない
    }
    if(this.fuseLeft<=0 && !this._exploded && this.state!=='placed'){
      if(this.type==='brown'){
        // 触らなければ無事に去る
        this._dead = true;
        spawnParticles(this.x, this.y, '#a07a4e', 8);
      } else {
        this._exploded = true;
      }
    }
  }
  draw(){
    const safe = this.state==='placed';
    const blink = !safe && this.fuseLeft < 2500;
    const fast  = !safe && this.fuseLeft < 1100;
    const blinkOn = blink ? (Math.floor(performance.now()/(fast?100:220))%2===0) : false;
    const wob = Math.sin(this.bobPhase)*this.bobAmp;

    ctx.save();
    ctx.translate(this.x, this.y + wob);
    ctx.scale(this.facing, 1);

    // かげ
    ctx.fillStyle = 'rgba(0,0,0,.35)';
    ctx.beginPath(); ctx.ellipse(2, this.r+2, this.r*0.9, 4, 0, 0, Math.PI*2); ctx.fill();

    // 足（歩いてる風に上下）
    const stepUp = (Math.floor(this.bobPhase*2)%2===0) ? -1 : 1;
    ctx.fillStyle = '#3a2a18';
    ctx.fillRect(-9,  this.r-2 + (stepUp>0?0:-2), 6, 6);
    ctx.fillRect( 3,  this.r-2 + (stepUp>0?-2:0), 6, 6);

    // 本体
    let baseCol, hi;
    if(this.type==='black'){ baseCol='#1c1c22'; hi='#3a3a48'; }
    else if(this.type==='red'){ baseCol='#d24a64'; hi='#ff8aa3'; }
    else { baseCol='#7a5230'; hi='#a07a4e'; } // brown=危険
    ctx.fillStyle = blinkOn ? '#fff' : baseCol;
    ctx.beginPath(); ctx.arc(0,0,this.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = blinkOn ? '#fff' : hi;
    ctx.beginPath(); ctx.arc(-7,-7,5,0,Math.PI*2); ctx.fill();

    // 茶ばくだんの「触るな」マーク（赤いオーラ＋ヒット蓄積メーター）
    if(this.type==='brown'){
      const meter = Math.min(1, this.swipeAccum / 120);
      // ベースの赤オーラ
      ctx.strokeStyle = 'rgba(255,40,40,'+ (0.55 + 0.3*Math.sin(performance.now()*0.012)) +')';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(0,0,this.r+3,0,Math.PI*2); ctx.stroke();
      // 蓄積メーター（円弧）
      if(meter > 0){
        ctx.strokeStyle = '#ffdd44';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0,0,this.r+6, -Math.PI/2, -Math.PI/2 + Math.PI*2*meter);
        ctx.stroke();
      }
      // ヒット直後の閃光
      if(this.hitFlash > 0){
        ctx.fillStyle = 'rgba(255,255,255,'+ (this.hitFlash*0.5) +')';
        ctx.beginPath(); ctx.arc(0,0,this.r+8,0,Math.PI*2); ctx.fill();
      }
    }
    // 気まぐれボム：ダッシュ中の速度線のみ
    if(this.dashy){
      if(this.dashing){
        const len = 14;
        const dx = this.dashVx, dy = this.dashVy;
        const m = Math.hypot(dx,dy) || 1;
        ctx.strokeStyle = 'rgba(255,220,40,.85)';
        ctx.lineWidth = 2;
        for(let i=-1;i<=1;i++){
          ctx.beginPath();
          ctx.moveTo(-dx/m*this.r*0.7 + i*4, -dy/m*this.r*0.7 + i*4);
          ctx.lineTo(-dx/m*(this.r*0.7+len) + i*4, -dy/m*(this.r*0.7+len) + i*4);
          ctx.stroke();
        }
      }
    }

    // ねじまき
    ctx.fillStyle = '#caa84a';
    ctx.beginPath(); ctx.arc(0,-this.r-2,3,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#caa84a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-4,-this.r-6);
    ctx.lineTo(4,-this.r-2);
    ctx.moveTo(4,-this.r-6);
    ctx.lineTo(-4,-this.r-2);
    ctx.stroke();

    // 目
    if(this.type==='brown'){
      // X 目（怒り）
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-8,-4); ctx.lineTo(-2, 2);
      ctx.moveTo(-2,-4); ctx.lineTo(-8, 2);
      ctx.moveTo( 2,-4); ctx.lineTo( 8, 2);
      ctx.moveTo( 8,-4); ctx.lineTo( 2, 2);
      ctx.stroke();
    } else {
      ctx.fillStyle = '#fff';
      ctx.fillRect(-7,-2,5,7);
      ctx.fillRect( 2,-2,5,7);
      ctx.fillStyle = '#000';
      ctx.fillRect(-6, 0,3,4);
      ctx.fillRect( 3, 0,3,4);
    }

    // 口
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    if(this.type==='red'){
      ctx.arc(0,8,4,0.1*Math.PI,0.9*Math.PI);
    } else if(this.type==='brown'){
      // 怒り口（逆Vの牙）
      ctx.moveTo(-4,10); ctx.lineTo(0,6); ctx.lineTo(4,10);
    } else {
      ctx.moveTo(-3,9); ctx.lineTo(3,9);
    }
    ctx.stroke();

    ctx.restore();
  }
}

// 出現口（ポータル）：レベルが unlock 以上で開放
const PORTALS = [
  {side:'top',   pos:0.5, unlock:1},  // Lv1: 真ん中の上
  {side:'top',   pos:0.2, unlock:2},  // Lv2: + 左上
  {side:'top',   pos:0.8, unlock:2},  //      + 右上
  {side:'left',  pos:0.4, unlock:3},  // Lv3: + 左中
  {side:'right', pos:0.4, unlock:3},  //      + 右中
  {side:'left',  pos:0.75,unlock:4},  // Lv4: + 左下
  {side:'right', pos:0.75,unlock:4},  //      + 右下
  {side:'top',   pos:0.35,unlock:5},  // Lv5: + 上の隙間
  {side:'top',   pos:0.65,unlock:5},
];

function pickPortal(){
  const open = PORTALS.filter(p=>p.unlock<=state.level);
  return open[Math.floor(Math.random()*open.length)];
}

function pickType(){
  // 茶（触ると即終了）：Lv2 から たまに、レベルで微増。最大4%。
  // 画面同時1体まで。
  const brownOnField = state.bombs.filter(b => b.type==='brown' && !b._dead).length;
  const brownChance = (state.level >= 2 && brownOnField < 1)
    ? Math.min(0.04, 0.012 + state.level * 0.003)
    : 0;
  if(Math.random() < brownChance) return 'brown';
  return Math.random() < 0.5 ? 'black' : 'red';
}

function makeBomb(){
  const p = pickPortal();
  const t = pickType();
  const b = new Bomb(t, p.side, p.pos);
  // 気まぐれダッシュ（黄色）：Lv3+ から低確率
  if(t !== 'brown' && state.level >= 3 && Math.random() < Math.min(0.18, 0.06 + state.level*0.012)){
    b.dashy = true;
    b.dashCooldown = 2200 + Math.random()*2500; // 登場直後は少し溜め
  }
  return b;
}

function spawnBomb(){
  // 未仕分けの「場上のばくだん」上限：レベルに応じて伸ばすが頭打ち
  const active = state.bombs.filter(b => !b._dead && b.state !== 'placed').length;
  const maxActive = Math.min(5 + state.level, 12); // Lv1=6, Lv7=12（以降頭打ち）
  if(active >= maxActive) return;
  state.bombs.push(makeBomb());
  // 同時2体は混雑が空いてる時だけ
  if(active + 1 < maxActive && state.level >= 5 && Math.random() < 0.25){
    state.bombs.push(makeBomb());
  }
}

function spawnParticles(x,y,color,n=18){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2;
    const sp = 2 + Math.random()*5;
    state.particles.push({
      x,y,
      vx: Math.cos(a)*sp,
      vy: Math.sin(a)*sp - 1,
      life: 600 + Math.random()*400,
      max: 1000,
      color,
      r: 2+Math.random()*3,
    });
  }
}

function explode(bomb){
  if(bomb._dead) return;
  spawnParticles(bomb.x, bomb.y, bomb.type==='black' ? '#ffaa33' : '#ff5577', 28);
  state.shake = 18;
  state.flash = 1;
  state.flashColor = '#ffd24a';
  bomb._exploded = true;
  bomb._dead = true;
  setTimeout(endGame, 400);
}

function placeBomb(bomb, zoneKey){
  const correct = (zoneKey==='red' && bomb.type==='red') || (zoneKey==='black' && bomb.type==='black');
  if(correct){
    bomb.state = 'placed';
    bomb.zone = zoneKey;
    bomb.pickTarget(zoneKey==='red' ? RED : BLK);
    // コンボ
    state.combo++;
    state.comboTimer = 0;
    const mul = comboMul(state.combo);
    const before = state.score;
    state.score = Math.min(9999, state.score + mul);
    state.scoreFloaters.push({x: bomb.x, y: bomb.y - 10, val: mul, mul: mul, life: 900, max: 900});
    spawnParticles(bomb.x, bomb.y, '#ffffaa', 8);
    // 1点ごとに ごく ゆっくり早くなる
    state.spawnInterval = Math.max(480, state.spawnInterval * 0.988);
    // レベル：8の倍数を跨いだら+1（コンボで複数跨ぐ場合に対応）
    if(Math.floor(state.score/8) > Math.floor(before/8)){
      state.level++;
      state.spawnInterval = Math.max(480, state.spawnInterval - 45);
    }
  }else{
    // 誤投入：そのゾーンの全ボム＋本体が連鎖爆発
    explode(bomb);
    state.bombs.forEach(b=>{
      if(b._dead) return;
      if(b.state==='placed' && b.zone===zoneKey){
        explode(b);
      }
    });
  }
}

function zoneAt(x,y){
  if(x>=RED.x && x<=RED.x+RED.w && y>=RED.y && y<=RED.y+RED.h) return 'red';
  if(x>=BLK.x && x<=BLK.x+BLK.w && y>=BLK.y && y<=BLK.y+BLK.h) return 'black';
  return null;
}

function pointInItem(x,y){
  return x>=ITEM.x && x<=ITEM.x+ITEM.w && y>=ITEM.y && y<=ITEM.y+ITEM.h;
}

function useItem(){
  if(state.itemCount <= 0) return;
  state.itemCount--;
  // 場上の未仕分けばくだんを全部除去（placed以外）
  state.bombs.forEach(b=>{
    if(b._dead) return;
    if(b.state==='placed') return;
    spawnParticles(b.x, b.y, '#ffffff', 14);
    spawnParticles(b.x, b.y, '#ffd24a', 6);
    b._dead = true;
  });
  // ドラッグ中だった場合の解放
  if(state.dragging){
    state.dragging = null;
  }
  state.flash = 0.7;
  state.flashColor = '#ffffff';
  state.shake = 14;
}

// ========= 入力 =========
function getPos(e){
  const r = cv.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  const sx = cv.width / r.width;
  const sy = cv.height / r.height;
  return {x:(t.clientX - r.left)*sx, y:(t.clientY - r.top)*sy};
}

function onDown(e){
  if(!state.running) return;
  e.preventDefault();
  const p = getPos(e);
  // アイテム枠タップ
  if(pointInItem(p.x, p.y)){
    useItem();
    return;
  }
  // 指の追跡を開始（茶ばくだんのスワイプ距離計測用）
  state.lastPointer = {x:p.x, y:p.y, active:true};
  // 起点が茶の上ならその瞬間の移動量0なのでカウントしない
  for(let i=state.bombs.length-1;i>=0;i--){
    const b = state.bombs[i];
    if(b._dead) continue;
    if(b.state==='placed') continue;
    if(b.type==='brown') continue;   // 茶はつかめない（指を通すだけ）
    const dx = p.x-b.x, dy = p.y-b.y;
    if(dx*dx+dy*dy <= (b.r+10)*(b.r+10)){
      state.dragging = b;
      state.dragOffset.x = b.x - p.x;
      state.dragOffset.y = b.y - p.y;
      b.state = 'drag';
      state.bombs.splice(i,1);
      state.bombs.push(b);
      return;
    }
  }
}
function onMove(e){
  if(!state.lastPointer || !state.lastPointer.active) {
    if(!state.dragging) return;
  }
  e.preventDefault();
  const p = getPos(e);
  // 茶ばくだんの上を通った距離を蓄積（一定以上で爆発）
  if(state.lastPointer && state.lastPointer.active){
    const dx = p.x - state.lastPointer.x;
    const dy = p.y - state.lastPointer.y;
    const moved = Math.hypot(dx, dy);
    if(moved > 0){
      state.bombs.forEach(b=>{
        if(b._dead || b.type !== 'brown' || b._exploded) return;
        const bdx = p.x - b.x, bdy = p.y - b.y;
        if(bdx*bdx + bdy*bdy <= (b.r+6)*(b.r+6)){
          b.swipeAccum += moved;
          b.hitFlash = 1;
          if(b.swipeAccum >= 120){
            explode(b);  // GAME OVER
          }
        }
      });
    }
    state.lastPointer.x = p.x;
    state.lastPointer.y = p.y;
  }
  if(state.dragging){
    state.dragging.x = p.x + state.dragOffset.x;
    state.dragging.y = p.y + state.dragOffset.y;
  }
}
function onUp(e){
  e.preventDefault();
  if(state.lastPointer) state.lastPointer.active = false;
  if(!state.dragging) return;
  const b = state.dragging;
  state.dragging = null;
  const z = zoneAt(b.x, b.y);
  if(z){
    placeBomb(b, z);
  } else {
    b.state = 'wander';
    b.pickTarget(FLOOR);
  }
}
cv.addEventListener('mousedown', onDown);
cv.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
cv.addEventListener('touchstart', onDown, {passive:false});
cv.addEventListener('touchmove', onMove, {passive:false});
window.addEventListener('touchend', onUp, {passive:false});
window.addEventListener('touchcancel', onUp, {passive:false});

// ========= 描画 =========
function drawBg(){
  ctx.fillStyle = '#2a2a36';
  ctx.fillRect(0,0,W,H);
  // フロアタイル
  ctx.strokeStyle = 'rgba(255,255,255,.04)';
  ctx.lineWidth = 1;
  for(let x=0;x<W;x+=24){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=24){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawZones(){
  // あかカーペット
  ctx.fillStyle = RED.color;
  roundRect(RED.x, RED.y, RED.w, RED.h, 10, true, false);
  ctx.strokeStyle = RED.edge; ctx.lineWidth = 3;
  roundRect(RED.x, RED.y, RED.w, RED.h, 10, false, true);
  // くろカーペット
  ctx.fillStyle = BLK.color;
  roundRect(BLK.x, BLK.y, BLK.w, BLK.h, 10, true, false);
  ctx.strokeStyle = BLK.edge; ctx.lineWidth = 3;
  roundRect(BLK.x, BLK.y, BLK.w, BLK.h, 10, false, true);

  // 半透明アイコン
  ctx.save();
  ctx.globalAlpha = .25;
  drawZoneIcon(RED.x+RED.w/2, RED.y+RED.h/2, '#ff5577');
  drawZoneIcon(BLK.x+BLK.w/2, BLK.y+BLK.h/2, '#000');
  ctx.restore();

  // ラベル
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('あか', RED.x+RED.w/2, RED.y+18);
  ctx.fillText('くろ', BLK.x+BLK.w/2, BLK.y+18);
}

function drawZoneIcon(cx,cy,col){
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(cx,cy,30,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillRect(cx-10,cy-3,7,10);
  ctx.fillRect(cx+3 ,cy-3,7,10);
}

function roundRect(x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
  if(fill) ctx.fill();
  if(stroke) ctx.stroke();
}

function drawHud(){
  ctx.fillStyle = 'rgba(0,0,0,.55)';
  ctx.fillRect(0,0,W,HUD_H);
  // SCORE（左）
  const overBest = state.score > save.best;
  ctx.fillStyle = overBest ? '#ffd24a' : '#fff';
  ctx.font = 'bold 15px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE ${state.score}`, 10, 22);
  // BEST（中央）
  ctx.fillStyle = '#ffd24a';
  ctx.textAlign = 'center';
  ctx.fillText(`🏆 ${save.best}`, W/2, 22);
  // Lv（右）
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'right';
  ctx.fillText(`Lv.${state.level}`, W-10, 22);
}

function drawChutes(){
  // 解放済みの上ポータル位置に投入口を描画
  ctx.save();
  PORTALS.forEach(p=>{
    if(p.unlock > state.level) return;
    if(p.side !== 'top') return;
    const cx = FLOOR.x + 16 + (FLOOR.w-32) * p.pos;
    const cy = FLOOR.y;
    // 影（厚み）
    ctx.fillStyle = 'rgba(0,0,0,.5)';
    roundRect(cx-16, cy-4, 32, 14, 4, true, false);
    // 本体（外枠）
    ctx.fillStyle = '#3b3b48';
    roundRect(cx-16, cy-7, 32, 11, 4, true, false);
    ctx.strokeStyle = '#caa84a';
    ctx.lineWidth = 2;
    roundRect(cx-16, cy-7, 32, 11, 4, false, true);
    // 暗いスリット
    ctx.fillStyle = '#08080d';
    roundRect(cx-12, cy-3, 24, 6, 2, true, false);
    // ハイライト
    ctx.fillStyle = 'rgba(255,255,255,.18)';
    ctx.fillRect(cx-10, cy-6, 20, 1);
  });
  ctx.restore();
}

function drawItem(){
  const x = ITEM.x, y = ITEM.y, s = ITEM.w;
  const active = state.itemCount > 0;
  ctx.save();
  // 枠
  ctx.fillStyle = active ? 'rgba(40,40,55,.92)' : 'rgba(30,30,40,.7)';
  roundRect(x, y, s, s, 10, true, false);
  ctx.strokeStyle = active ? '#ffd24a' : '#444';
  ctx.lineWidth = 2;
  roundRect(x, y, s, s, 10, false, true);
  // アイコン：爆発バースト
  const cx = x + s/2, cy = y + s/2 - 2;
  ctx.fillStyle = active ? '#ffd24a' : '#666';
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const a = i*Math.PI*2/10;
    const r = (i%2===0) ? 14 : 7;
    const px = cx + Math.cos(a)*r;
    const py = cy + Math.sin(a)*r;
    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = active ? '#ff6644' : '#333';
  ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2); ctx.fill();
  // ×N 表記
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px system-ui';
  ctx.textAlign = 'right';
  ctx.fillText('×'+state.itemCount, x+s-5, y+s-5);
  // ラベル
  ctx.fillStyle = active ? '#ffd24a' : '#888';
  ctx.font = 'bold 9px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('ぜんめつ', cx, y+10);
  ctx.restore();
}

function drawParticles(){
  state.particles.forEach(p=>{
    const a = Math.max(0, p.life / p.max);
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawScoreFloaters(){
  state.scoreFloaters.forEach(f=>{
    const a = Math.max(0, f.life / f.max);
    ctx.globalAlpha = a;
    ctx.fillStyle = f.mul >= 5 ? '#ff66cc' : f.mul >= 3 ? '#ffd24a' : f.mul >= 2 ? '#aaffaa' : '#ffffff';
    ctx.font = 'bold ' + (14 + f.mul*2) + 'px system-ui';
    ctx.textAlign = 'center';
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#000';
    ctx.strokeText(`+${f.val}`, f.x, f.y);
    ctx.fillText(`+${f.val}`, f.x, f.y);
  });
  ctx.globalAlpha = 1;
}

function drawCombo(){
  if(state.combo < 2) return;
  const mul = comboMul(state.combo);
  const x = W/2, y = HUD_H + 18;
  ctx.save();
  // 背景
  const tier = mul >= 5 ? '#ff66cc' : mul >= 3 ? '#ffd24a' : '#88ddff';
  ctx.fillStyle = 'rgba(0,0,0,.7)';
  roundRect(x-58, y-12, 116, 28, 14, true, false);
  ctx.strokeStyle = tier;
  ctx.lineWidth = 2;
  roundRect(x-58, y-12, 116, 28, 14, false, true);
  // テキスト
  ctx.fillStyle = tier;
  ctx.font = 'bold 14px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(`COMBO ×${mul} (${state.combo})`, x, y+3);
  // 残り時間バー
  const ratio = 1 - state.comboTimer / COMBO_TIMEOUT;
  ctx.fillStyle = tier;
  ctx.globalAlpha = .8;
  ctx.fillRect(x-50 + 100*(1-ratio)/2, y+10, 100*ratio, 3);
  ctx.restore();
}

// ========= ループ =========
let last = 0;
function loop(t){
  const dt = Math.min(40, t - last); last = t;

  if(state.running){
    state.spawnTimer += dt;
    if(state.spawnTimer >= state.spawnInterval){
      state.spawnTimer = 0;
      spawnBomb();
    }
    state.bombs.forEach(b=>{ if(b.state!=='drag') b.update(dt); });
    state.bombs.forEach(b=>{
      if(b._exploded && !b._dead) explode(b);
    });
    state.bombs = state.bombs.filter(b=>!b._dead);
    state.particles.forEach(p=>{
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.2;
      p.life -= dt;
    });
    state.particles = state.particles.filter(p=>p.life>0);
    // コンボのタイムアウト
    if(state.combo > 0){
      state.comboTimer += dt;
      if(state.comboTimer >= COMBO_TIMEOUT){
        state.combo = 0;
        state.comboTimer = 0;
      }
    }
    // 浮きスコアの更新
    state.scoreFloaters.forEach(f=>{ f.y -= dt*0.04; f.life -= dt; });
    state.scoreFloaters = state.scoreFloaters.filter(f=>f.life>0);
  }

  ctx.save();
  if(state.shake>0){
    const sx = (Math.random()-0.5)*state.shake;
    const sy = (Math.random()-0.5)*state.shake;
    ctx.translate(sx,sy);
    state.shake *= 0.85;
    if(state.shake<0.5) state.shake = 0;
  }

  drawBg();
  drawZones();
  drawChutes();
  // 描画順：placed → wander → drag (drag最前面)
  const order = ['placed','wander','enter','drag'];
  state.bombs.slice().sort((a,b)=>order.indexOf(a.state)-order.indexOf(b.state)).forEach(b=>b.draw());
  drawParticles();
  drawScoreFloaters();
  drawHud();
  drawCombo();
  drawItem();

  if(state.flash>0){
    ctx.fillStyle = state.flashColor;
    ctx.globalAlpha = state.flash;
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = 1;
    state.flash *= 0.85;
    if(state.flash<0.02) state.flash = 0;
  }

  ctx.restore();

  requestAnimationFrame(loop);
}

function startGame(){
  state.bombs = [];
  state.particles = [];
  state.score = 0;
  state.level = 1;
  state.spawnInterval = 1900;
  state.spawnTimer = 0;
  state.running = true;
  state.gameOver = false;
  // 持ち物からアイテムをセット
  state.itemCount = save.owned.zenmetsu || 0;
  state.combo = 0;
  state.comboTimer = 0;
  state.scoreFloaters = [];
  hideHome();
  gameoverEl.classList.add('hidden');
}

function endGame(){
  if(state.gameOver) return;
  state.gameOver = true;
  state.running = false;
  // 報酬：スコア = コイン
  const earned = state.score;
  save.coins += earned;
  // 持ち物：使い切ったぶんを永続化
  save.owned.zenmetsu = state.itemCount;
  // ベスト
  let isNewBest = false;
  if(state.score > save.best){
    save.best = state.score;
    isNewBest = true;
  }
  // 履歴
  save.history.unshift({score: state.score, at: Date.now()});
  if(save.history.length > 10) save.history.length = 10;
  SAVE.save(save);
  // ゲームオーバー画面
  goScoreEl.textContent = state.score;
  goCoinsEl.textContent = earned;
  goBestEl.textContent = isNewBest
    ? '🎉 ハイスコアこうしん！'
    : `さいこう: ${save.best}`;
  gameoverEl.classList.remove('hidden');
}

// デイリーログイン
function checkDailyBonus(){
  const today = new Date();
  const todayStr = today.getFullYear() + '-' +
                   String(today.getMonth()+1).padStart(2,'0') + '-' +
                   String(today.getDate()).padStart(2,'0');
  const lastLogin = localStorage.getItem('bomb_lastLogin');
  if(lastLogin === todayStr) return null;

  let streak = +localStorage.getItem('bomb_loginStreak') || 0;
  if(lastLogin){
    const last = new Date(lastLogin + 'T00:00:00');
    const t = new Date(todayStr + 'T00:00:00');
    const dayDiff = Math.round((t - last) / 86400000);
    if(dayDiff === 1) streak++;
    else streak = 1;
  } else {
    streak = 1;
  }
  // 報酬テーブル（7日サイクル）
  const day = ((streak - 1) % 7) + 1;
  const coinsTable = [50, 75, 100, 150, 200, 300, 500];
  const reward = { coins: coinsTable[day-1], zenmetsu: (day===7 ? 1 : 0) };
  save.coins += reward.coins;
  if(reward.zenmetsu){
    save.owned.zenmetsu = (save.owned.zenmetsu||0) + reward.zenmetsu;
  }
  SAVE.save(save);
  localStorage.setItem('bomb_lastLogin', todayStr);
  localStorage.setItem('bomb_loginStreak', String(streak));
  return { streak, day, reward };
}

function showDailyModal(info){
  const dEl = document.getElementById('daily');
  document.getElementById('dailyStreak').textContent = info.streak;
  document.getElementById('dailyCoins').textContent = info.reward.coins;
  const bonus = document.getElementById('dailyBonus');
  if(info.reward.zenmetsu){
    bonus.classList.remove('hidden');
  } else {
    bonus.classList.add('hidden');
  }
  dEl.classList.remove('hidden');
  document.getElementById('dailyOk').onclick = ()=>{
    dEl.classList.add('hidden');
    refreshHome();
  };
}

function buyZenmetsu(){
  if(save.coins < ZEN_PRICE) return;
  save.coins -= ZEN_PRICE;
  save.owned.zenmetsu = (save.owned.zenmetsu||0) + 1;
  SAVE.save(save);
  refreshHome();
}

startBtn.addEventListener('click', startGame);
goHomeBtn.addEventListener('click', () => { showHome(); });
buyBtnEl.addEventListener('click', buyZenmetsu);

function fit(){
  const stage = document.getElementById('stage');
  const sw = stage.clientWidth, sh = stage.clientHeight;
  const ratio = W/H;
  let w = sw, h = sw/ratio;
  if(h > sh){ h = sh; w = sh*ratio; }
  cv.style.width = w+'px';
  cv.style.height = h+'px';
}
window.addEventListener('resize', fit);
fit();

// 初期表示はホーム
showHome();
// デイリーログインチェック
const dailyInfo = checkDailyBonus();
if(dailyInfo) showDailyModal(dailyInfo);

requestAnimationFrame(loop);

})();
</script>
</body>
</html>
