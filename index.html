<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ボムへいをわけろ！</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
  html,body{margin:0;padding:0;height:100%;background:#222;overflow:hidden;font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;color:#fff;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{background:#000;touch-action:none;display:block;box-shadow:0 0 24px rgba(0,0,0,.6);}
  #overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.65);z-index:10;text-align:center;padding:24px;}
  #overlay h1{font-size:28px;margin:0 0 8px;letter-spacing:.05em;}
  #overlay p{margin:6px 0;font-size:14px;line-height:1.6;}
  #overlay button{margin-top:18px;padding:12px 28px;font-size:18px;border:none;border-radius:24px;background:#ffcc33;color:#222;font-weight:bold;cursor:pointer;}
  #overlay.hidden{display:none;}
  .small{font-size:12px;opacity:.7;}
</style>
</head>
<body>
<div id="stage"><canvas id="cv" width="360" height="640"></canvas></div>
<div id="overlay">
  <h1>ボムへいをわけろ！</h1>
  <p>くろい ボムへい → くろい ばしょ<br>あかい ボムへい → あかい ばしょ</p>
  <p class="small">ドラッグで うごかす<br>まちがえると ばくはつ！</p>
  <p class="small" id="best"></p>
  <button id="start">スタート</button>
</div>
<script>
(() => {
'use strict';

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start');
const bestEl = document.getElementById('best');
const W = cv.width, H = cv.height;

// レイアウト
const BELT = {x:0, y:90, w:W, h:80};            // 上部ベルトコンベア
const RED  = {x:8,   y:300, w:W/2-12, h:H-310, color:'#c0344a'};   // 左：あか（友達ボム）
const BLK  = {x:W/2+4, y:300, w:W/2-12, h:H-310, color:'#1c1c22'}; // 右：くろ（通常ボム）

// state
const state = {
  bombs: [],
  score: 0,
  best: +localStorage.getItem('bomb_best') || 0,
  spawnTimer: 0,
  spawnInterval: 1400, // ms
  level: 1,
  running: false,
  dragging: null,
  dragOffset: {x:0,y:0},
  shake: 0,
  flash: 0,
  flashColor: '#fff',
  particles: [],
  beltOffset: 0,
  gameOver: false,
};

bestEl.textContent = state.best ? `さいこう: ${state.best}` : '';

// ========= ボムへい =========
class Bomb{
  constructor(type){
    this.type = type;            // 'black' or 'red'
    this.r = 22;
    this.x = -30;
    this.y = BELT.y + BELT.h/2;
    this.vx = 0;
    this.vy = 0;
    this.onBelt = true;
    this.fuseTime = 7000;        // 爆発までの猶予 (ms)
    this.fuseLeft = this.fuseTime;
    this.placed = false;
    this.exploded = false;
    this.wiggle = Math.random()*Math.PI*2;
  }
  update(dt){
    this.wiggle += dt*0.005;
    if(this.onBelt && !this.dragging){
      // ベルト上：ゆっくり右に流れる
      this.x += dt * 0.06;
      if(this.x > W + 30){ // 流れ落ちたら導火線消費は早めに進めない
        // ベルトの端に着いたら止まって自然待機
        this.x = W - this.r - 4;
        this.onBelt = false;
      }
    }
    if(!this.placed){
      this.fuseLeft -= dt;
      if(this.fuseLeft <= 0 && !this.exploded){
        this.exploded = true;
      }
    }
  }
  draw(){
    const blink = this.fuseLeft < 2500;
    const fast = this.fuseLeft < 1200;
    const blinkOn = blink ? (Math.floor(performance.now()/(fast?100:220))%2===0) : false;
    const wob = Math.sin(this.wiggle)*1.5;

    ctx.save();
    ctx.translate(this.x, this.y + wob);

    // かげ
    ctx.fillStyle = 'rgba(0,0,0,.35)';
    ctx.beginPath(); ctx.ellipse(2, this.r+2, this.r*0.9, 4, 0, 0, Math.PI*2); ctx.fill();

    // 足
    ctx.fillStyle = '#3a2a18';
    ctx.fillRect(-10, this.r-2, 6, 6);
    ctx.fillRect( 4, this.r-2, 6, 6);

    // 本体
    const baseCol = this.type==='black' ? '#1c1c22' : '#d24a64';
    const hi = this.type==='black' ? '#3a3a48' : '#ff8aa3';
    ctx.fillStyle = blinkOn ? '#fff' : baseCol;
    ctx.beginPath(); ctx.arc(0,0,this.r,0,Math.PI*2); ctx.fill();
    // ハイライト
    ctx.fillStyle = blinkOn ? '#fff' : hi;
    ctx.beginPath(); ctx.arc(-7,-7,5,0,Math.PI*2); ctx.fill();

    // ねじまき（背中）
    ctx.fillStyle = '#caa84a';
    ctx.beginPath(); ctx.arc(0,-this.r-2,3,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#caa84a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-4,-this.r-6);
    ctx.lineTo(4,-this.r-2);
    ctx.moveTo(4,-this.r-6);
    ctx.lineTo(-4,-this.r-2);
    ctx.stroke();

    // 目
    ctx.fillStyle = '#fff';
    ctx.fillRect(-7,-2,5,7);
    ctx.fillRect( 2,-2,5,7);
    ctx.fillStyle = '#000';
    ctx.fillRect(-6, 0,3,4);
    ctx.fillRect( 3, 0,3,4);

    // 口（友達ボムは笑顔）
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    if(this.type==='red'){
      ctx.arc(0,8,4,0.1*Math.PI,0.9*Math.PI);
    }else{
      ctx.moveTo(-3,9); ctx.lineTo(3,9);
    }
    ctx.stroke();

    ctx.restore();
  }
}

function spawnBomb(){
  const type = Math.random() < 0.5 ? 'black' : 'red';
  const b = new Bomb(type);
  b.x = -20;
  state.bombs.push(b);
}

function spawnParticles(x,y,color,n=18){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2;
    const sp = 2 + Math.random()*5;
    state.particles.push({
      x,y,
      vx: Math.cos(a)*sp,
      vy: Math.sin(a)*sp - 1,
      life: 600 + Math.random()*400,
      max: 1000,
      color,
      r: 2+Math.random()*3,
    });
  }
}

function explode(bomb, reason){
  spawnParticles(bomb.x, bomb.y, bomb.type==='black' ? '#ffaa33' : '#ff5577', 28);
  state.shake = 18;
  state.flash = 1;
  state.flashColor = '#ffd24a';
  bomb.exploded = true;
  bomb._dead = true;
  // ゲームオーバー
  setTimeout(endGame, 400);
}

function placeBomb(bomb, zone){
  const correct = (zone==='red' && bomb.type==='red') || (zone==='black' && bomb.type==='black');
  if(correct){
    bomb.placed = true;
    bomb._dead = true;
    state.score = Math.min(9999, state.score + 1);
    spawnParticles(bomb.x, bomb.y, '#ffffaa', 10);
    // レベル上昇
    if(state.score % 8 === 0){
      state.level++;
      state.spawnInterval = Math.max(380, state.spawnInterval - 80);
    }
  }else{
    // 誤投入：ゾーンの全ボムが連鎖爆発
    explode(bomb, 'wrong-zone');
    state.bombs.forEach(b=>{
      if(b._dead) return;
      const z = zoneOfBomb(b);
      if(z===zone) explode(b, 'chain');
    });
  }
}

function zoneOfBomb(b){
  if(b.x>=RED.x && b.x<=RED.x+RED.w && b.y>=RED.y && b.y<=RED.y+RED.h) return 'red';
  if(b.x>=BLK.x && b.x<=BLK.x+BLK.w && b.y>=BLK.y && b.y<=BLK.y+BLK.h) return 'black';
  return null;
}

// ========= 入力 =========
function getPos(e){
  const r = cv.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  const sx = cv.width / r.width;
  const sy = cv.height / r.height;
  return {x:(t.clientX - r.left)*sx, y:(t.clientY - r.top)*sy};
}

function onDown(e){
  if(!state.running) return;
  e.preventDefault();
  const p = getPos(e);
  // 上から重なり優先（あとから描かれる新しいボムを優先）
  for(let i=state.bombs.length-1;i>=0;i--){
    const b = state.bombs[i];
    if(b._dead || b.placed) continue;
    const dx = p.x-b.x, dy = p.y-b.y;
    if(dx*dx+dy*dy <= (b.r+8)*(b.r+8)){
      state.dragging = b;
      state.dragOffset.x = b.x - p.x;
      state.dragOffset.y = b.y - p.y;
      b.dragging = true;
      b.onBelt = false;
      // 末尾に持ってきて最前面に
      state.bombs.splice(i,1);
      state.bombs.push(b);
      return;
    }
  }
}
function onMove(e){
  if(!state.dragging) return;
  e.preventDefault();
  const p = getPos(e);
  state.dragging.x = p.x + state.dragOffset.x;
  state.dragging.y = p.y + state.dragOffset.y;
}
function onUp(e){
  if(!state.dragging) return;
  e.preventDefault();
  const b = state.dragging;
  b.dragging = false;
  state.dragging = null;
  const z = zoneOfBomb(b);
  if(z) placeBomb(b, z);
  else {
    // ゾーン外でリリース → ベルト上ならベルト復帰、それ以外ならその場待機
    if(b.y < BELT.y + BELT.h + 10){
      b.onBelt = true;
    }
  }
}
cv.addEventListener('mousedown', onDown);
cv.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
cv.addEventListener('touchstart', onDown, {passive:false});
cv.addEventListener('touchmove', onMove, {passive:false});
window.addEventListener('touchend', onUp, {passive:false});
window.addEventListener('touchcancel', onUp, {passive:false});

// ========= 描画 =========
function drawBg(){
  // 工場床
  ctx.fillStyle = '#2a2a36';
  ctx.fillRect(0,0,W,H);
  // 床のタイル
  ctx.strokeStyle = 'rgba(255,255,255,.04)';
  ctx.lineWidth = 1;
  for(let x=0;x<W;x+=24){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=24){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawBelt(){
  // 本体
  ctx.fillStyle = '#3b3b48';
  ctx.fillRect(BELT.x, BELT.y, BELT.w, BELT.h);
  // ローラー縞
  ctx.fillStyle = '#1f1f28';
  state.beltOffset = (state.beltOffset + 2) % 24;
  for(let x=-24+state.beltOffset; x<W; x+=24){
    ctx.fillRect(x, BELT.y+BELT.h-8, 12, 6);
    ctx.fillRect(x, BELT.y+2, 12, 6);
  }
  // 縁
  ctx.fillStyle = '#caa84a';
  ctx.fillRect(BELT.x, BELT.y-4, BELT.w, 4);
  ctx.fillRect(BELT.x, BELT.y+BELT.h, BELT.w, 4);
}

function drawZones(){
  // あかゾーン
  ctx.fillStyle = RED.color;
  roundRect(RED.x, RED.y, RED.w, RED.h, 14, true, false);
  ctx.strokeStyle = '#ff8090';
  ctx.lineWidth = 3;
  roundRect(RED.x, RED.y, RED.w, RED.h, 14, false, true);
  // くろゾーン
  ctx.fillStyle = BLK.color;
  roundRect(BLK.x, BLK.y, BLK.w, BLK.h, 14, true, false);
  ctx.strokeStyle = '#666680';
  ctx.lineWidth = 3;
  roundRect(BLK.x, BLK.y, BLK.w, BLK.h, 14, false, true);

  // アイコン
  ctx.save();
  ctx.globalAlpha = .35;
  drawZoneIcon(RED.x+RED.w/2, RED.y+RED.h/2, '#ff5577');
  drawZoneIcon(BLK.x+BLK.w/2, BLK.y+BLK.h/2, '#000');
  ctx.restore();

  // ラベル
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('あか', RED.x+RED.w/2, RED.y+22);
  ctx.fillText('くろ', BLK.x+BLK.w/2, BLK.y+22);
}

function drawZoneIcon(cx,cy,col){
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(cx,cy,40,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillRect(cx-12,cy-4,8,12);
  ctx.fillRect(cx+4 ,cy-4,8,12);
}

function roundRect(x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
  if(fill) ctx.fill();
  if(stroke) ctx.stroke();
}

function drawHud(){
  ctx.fillStyle = 'rgba(0,0,0,.5)';
  ctx.fillRect(0,0,W,40);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE ${state.score}`, 12, 26);
  ctx.textAlign = 'right';
  ctx.fillText(`Lv.${state.level}`, W-12, 26);
  ctx.textAlign = 'center';
  ctx.fillText('ボムへいをわけろ！', W/2, 26);
}

function drawParticles(){
  state.particles.forEach(p=>{
    const a = Math.max(0, p.life / p.max);
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ========= ループ =========
let last = 0;
function loop(t){
  const dt = Math.min(40, t - last); last = t;

  if(state.running){
    state.spawnTimer += dt;
    if(state.spawnTimer >= state.spawnInterval){
      state.spawnTimer = 0;
      spawnBomb();
    }
    state.bombs.forEach(b=>b.update(dt));
    state.bombs.forEach(b=>{
      if(b.exploded && !b._dead){
        explode(b, 'fuse');
      }
    });
    // 死んだボムの掃除
    state.bombs = state.bombs.filter(b=>!b._dead);
    // パーティクル
    state.particles.forEach(p=>{
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.2;
      p.life -= dt;
    });
    state.particles = state.particles.filter(p=>p.life>0);
  }

  // 画面ゆれ
  ctx.save();
  if(state.shake>0){
    const sx = (Math.random()-0.5)*state.shake;
    const sy = (Math.random()-0.5)*state.shake;
    ctx.translate(sx,sy);
    state.shake *= 0.85;
    if(state.shake<0.5) state.shake = 0;
  }

  drawBg();
  drawZones();
  drawBelt();
  state.bombs.forEach(b=>b.draw());
  drawParticles();
  drawHud();

  if(state.flash>0){
    ctx.fillStyle = state.flashColor;
    ctx.globalAlpha = state.flash;
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = 1;
    state.flash *= 0.85;
    if(state.flash<0.02) state.flash = 0;
  }

  ctx.restore();

  requestAnimationFrame(loop);
}

function startGame(){
  state.bombs = [];
  state.particles = [];
  state.score = 0;
  state.level = 1;
  state.spawnInterval = 1400;
  state.spawnTimer = 0;
  state.running = true;
  state.gameOver = false;
  overlay.classList.add('hidden');
}

function endGame(){
  if(state.gameOver) return;
  state.gameOver = true;
  state.running = false;
  if(state.score > state.best){
    state.best = state.score;
    localStorage.setItem('bomb_best', state.best);
  }
  bestEl.textContent = `さいこう: ${state.best}　／　こんかい: ${state.score}`;
  overlay.querySelector('h1').textContent = 'ばくはつ！';
  overlay.querySelector('button').textContent = 'もういちど';
  overlay.classList.remove('hidden');
}

startBtn.addEventListener('click', startGame);

// canvas を画面にフィット
function fit(){
  const stage = document.getElementById('stage');
  const sw = stage.clientWidth, sh = stage.clientHeight;
  const ratio = W/H;
  let w = sw, h = sw/ratio;
  if(h > sh){ h = sh; w = sh*ratio; }
  cv.style.width = w+'px';
  cv.style.height = h+'px';
}
window.addEventListener('resize', fit);
fit();

requestAnimationFrame(loop);

})();
</script>
</body>
</html>
