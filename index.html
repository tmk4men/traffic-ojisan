<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ばくだんをわけろ！</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
  html,body{margin:0;padding:0;height:100%;background:#222;overflow:hidden;font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;color:#fff;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{background:#000;touch-action:none;display:block;box-shadow:0 0 24px rgba(0,0,0,.6);}
  #overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.65);z-index:10;text-align:center;padding:24px;}
  #overlay h1{font-size:28px;margin:0 0 8px;letter-spacing:.05em;}
  #overlay p{margin:6px 0;font-size:14px;line-height:1.6;}
  #overlay button{margin-top:18px;padding:12px 28px;font-size:18px;border:none;border-radius:24px;background:#ffcc33;color:#222;font-weight:bold;cursor:pointer;}
  #overlay.hidden{display:none;}
  .small{font-size:12px;opacity:.7;}
</style>
</head>
<body>
<div id="stage"><canvas id="cv" width="360" height="640"></canvas></div>
<div id="overlay">
  <h1>ばくだんをわけろ！</h1>
  <p>くろい ばくだん → くろい ばしょ<br>あかい ばくだん → あかい ばしょ</p>
  <p class="small">ドラッグで うごかす<br>まちがえると ばくはつ！<br>ちゃいろは さわるな きけん！</p>
  <p class="small" id="best"></p>
  <button id="start">スタート</button>
</div>
<script>
(() => {
'use strict';

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start');
const bestEl = document.getElementById('best');
const W = cv.width, H = cv.height;

// レイアウト
const HUD_H = 36;
const FLOOR = {x:6, y:HUD_H+8, w:W-12, h:328};   // 徘徊エリア（広め）
const ZONE_Y = FLOOR.y + FLOOR.h + 8;
const ZONE_H = H - ZONE_Y - 8;
const RED = {x:8,         y:ZONE_Y, w:W/2-12, h:ZONE_H, color:'#b8324a', edge:'#ff8090'}; // 左：あか
const BLK = {x:W/2+4,     y:ZONE_Y, w:W/2-12, h:ZONE_H, color:'#1c1c22', edge:'#666680'}; // 右：くろ

// state
const state = {
  bombs: [],
  score: 0,
  best: +localStorage.getItem('bomb_best') || 0,
  spawnTimer: 0,
  spawnInterval: 1600,
  level: 1,
  running: false,
  dragging: null,
  dragOffset: {x:0,y:0},
  shake: 0,
  flash: 0,
  flashColor: '#fff',
  particles: [],
  gameOver: false,
};

bestEl.textContent = state.best ? `さいこう: ${state.best}` : '';

// ========= ばくだん =========
class Bomb{
  constructor(type, side='top', pos=0.5){
    this.type = type;            // 'black' | 'red' | 'brown' (brown=触ると即終了)
    this.side = side;            // 'left' | 'right' | 'top'
    this.r = 20;
    if(side==='left'){
      this.x = -24;
      this.y = FLOOR.y + 16 + (FLOOR.h-32) * pos;
    } else if(side==='right'){
      this.x = W + 24;
      this.y = FLOOR.y + 16 + (FLOOR.h-32) * pos;
    } else { // top
      this.x = FLOOR.x + 16 + (FLOOR.w-32) * pos;
      this.y = FLOOR.y - 24;
    }
    this.state = 'enter';        // enter | wander | drag | placed
    this.zone = null;            // 'red' | 'black' (placed時)
    // レベルで導火線が短くなる：Lv1で8.5秒 → Lv10で約4秒
    // 茶ばくだんは触らなければ安全。一定時間で去る。
    this.fuseTime = (type==='brown')
      ? 7000
      : Math.max(3800, 8500 - (state.level-1) * 500);
    this.fuseLeft = this.fuseTime;
    this.targetX = 0;
    this.targetY = 0;
    this.wanderTimer = 0;
    this.wiggle = Math.random()*Math.PI*2;
    this.bobPhase = Math.random()*Math.PI*2;
    this.facing = 1;
    this._dead = false;
    this._exploded = false;
    // ばくだん毎の個性
    this.speedMul = 0.55 + Math.random()*1.05;          // 0.55〜1.6倍速
    this.wanderMinT = 350 + Math.random()*800;
    this.wanderMaxT = this.wanderMinT + 500 + Math.random()*1700;
    this.idleChance = 0.10 + Math.random()*0.30;        // 10〜40%でその場休憩
    this.bobAmp    = 1.0 + Math.random()*1.6;           // 上下ゆれ幅
  }
  pickTarget(area){
    if(Math.random() < this.idleChance){
      // その場で休憩
      this.targetX = this.x;
      this.targetY = this.y;
      this.wanderTimer = 250 + Math.random()*700;
      return;
    }
    // ターゲット範囲：近距離 or 遠距離をランダム選択（歩き方の多様化）
    const span = Math.random() < 0.4 ? 0.4 : 1.0;       // 短距離 or 自由移動
    const cx = this.x, cy = this.y;
    const halfW = (area.w-32)*0.5*span;
    const halfH = (area.h-32)*0.5*span;
    let tx = cx + (Math.random()*2-1)*halfW;
    let ty = cy + (Math.random()*2-1)*halfH;
    // エリア内にクランプ
    tx = Math.max(area.x+16, Math.min(area.x+area.w-16, tx));
    ty = Math.max(area.y+16, Math.min(area.y+area.h-16, ty));
    this.targetX = tx;
    this.targetY = ty;
    this.wanderTimer = this.wanderMinT + Math.random()*(this.wanderMaxT - this.wanderMinT);
  }
  walkTo(dt, baseSpeed){
    const dx = this.targetX - this.x, dy = this.targetY - this.y;
    const d = Math.hypot(dx,dy);
    if(d > 1){
      const sp = baseSpeed * this.speedMul * dt;
      this.x += dx/d * Math.min(sp, d);
      this.y += dy/d * Math.min(sp, d);
      this.facing = dx >= 0 ? 1 : -1;
    }
  }
  update(dt){
    this.wiggle += dt*0.005;
    this.bobPhase += dt*0.01;
    if(this.state==='enter'){
      const sp = dt*0.05;
      let arrived = false;
      if(this.side==='left'){
        this.x += sp; this.facing = 1;
        if(this.x > FLOOR.x + 24) arrived = true;
      } else if(this.side==='right'){
        this.x -= sp; this.facing = -1;
        if(this.x < FLOOR.x + FLOOR.w - 24) arrived = true;
      } else { // top
        this.y += sp;
        if(this.y > FLOOR.y + 24) arrived = true;
      }
      this.fuseLeft -= dt;
      if(arrived){
        this.state = 'wander';
        this.pickTarget(FLOOR);
      }
    }
    else if(this.state==='wander'){
      this.wanderTimer -= dt;
      if(this.wanderTimer<=0) this.pickTarget(FLOOR);
      this.walkTo(dt, 0.04);
      this.fuseLeft -= dt;
    }
    else if(this.state==='placed'){
      this.wanderTimer -= dt;
      if(this.wanderTimer<=0) this.pickTarget(this.zone==='red' ? RED : BLK);
      this.walkTo(dt, 0.025);
      // 安全：fuseは進まない
    }
    if(this.fuseLeft<=0 && !this._exploded && this.state!=='placed'){
      if(this.type==='brown'){
        // 触らなければ無事に去る
        this._dead = true;
        spawnParticles(this.x, this.y, '#a07a4e', 8);
      } else {
        this._exploded = true;
      }
    }
  }
  draw(){
    const safe = this.state==='placed';
    const blink = !safe && this.fuseLeft < 2500;
    const fast  = !safe && this.fuseLeft < 1100;
    const blinkOn = blink ? (Math.floor(performance.now()/(fast?100:220))%2===0) : false;
    const wob = Math.sin(this.bobPhase)*this.bobAmp;

    ctx.save();
    ctx.translate(this.x, this.y + wob);
    ctx.scale(this.facing, 1);

    // かげ
    ctx.fillStyle = 'rgba(0,0,0,.35)';
    ctx.beginPath(); ctx.ellipse(2, this.r+2, this.r*0.9, 4, 0, 0, Math.PI*2); ctx.fill();

    // 足（歩いてる風に上下）
    const stepUp = (Math.floor(this.bobPhase*2)%2===0) ? -1 : 1;
    ctx.fillStyle = '#3a2a18';
    ctx.fillRect(-9,  this.r-2 + (stepUp>0?0:-2), 6, 6);
    ctx.fillRect( 3,  this.r-2 + (stepUp>0?-2:0), 6, 6);

    // 本体
    let baseCol, hi;
    if(this.type==='black'){ baseCol='#1c1c22'; hi='#3a3a48'; }
    else if(this.type==='red'){ baseCol='#d24a64'; hi='#ff8aa3'; }
    else { baseCol='#7a5230'; hi='#a07a4e'; } // brown=危険
    ctx.fillStyle = blinkOn ? '#fff' : baseCol;
    ctx.beginPath(); ctx.arc(0,0,this.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = blinkOn ? '#fff' : hi;
    ctx.beginPath(); ctx.arc(-7,-7,5,0,Math.PI*2); ctx.fill();

    // 茶ばくだんの「触るな」マーク（赤い枠＋禁止記号）
    if(this.type==='brown'){
      // 赤いオーラ
      ctx.strokeStyle = 'rgba(255,40,40,'+ (0.6+0.3*Math.sin(performance.now()*0.012)) +')';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(0,0,this.r+3,0,Math.PI*2); ctx.stroke();
    }

    // ねじまき
    ctx.fillStyle = '#caa84a';
    ctx.beginPath(); ctx.arc(0,-this.r-2,3,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#caa84a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-4,-this.r-6);
    ctx.lineTo(4,-this.r-2);
    ctx.moveTo(4,-this.r-6);
    ctx.lineTo(-4,-this.r-2);
    ctx.stroke();

    // 目
    if(this.type==='brown'){
      // X 目（怒り）
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-8,-4); ctx.lineTo(-2, 2);
      ctx.moveTo(-2,-4); ctx.lineTo(-8, 2);
      ctx.moveTo( 2,-4); ctx.lineTo( 8, 2);
      ctx.moveTo( 8,-4); ctx.lineTo( 2, 2);
      ctx.stroke();
    } else {
      ctx.fillStyle = '#fff';
      ctx.fillRect(-7,-2,5,7);
      ctx.fillRect( 2,-2,5,7);
      ctx.fillStyle = '#000';
      ctx.fillRect(-6, 0,3,4);
      ctx.fillRect( 3, 0,3,4);
    }

    // 口
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    if(this.type==='red'){
      ctx.arc(0,8,4,0.1*Math.PI,0.9*Math.PI);
    } else if(this.type==='brown'){
      // 怒り口（逆Vの牙）
      ctx.moveTo(-4,10); ctx.lineTo(0,6); ctx.lineTo(4,10);
    } else {
      ctx.moveTo(-3,9); ctx.lineTo(3,9);
    }
    ctx.stroke();

    ctx.restore();
  }
}

// 出現口（ポータル）：レベルが unlock 以上で開放
const PORTALS = [
  {side:'top',   pos:0.5, unlock:1},  // Lv1: 真ん中の上
  {side:'top',   pos:0.2, unlock:2},  // Lv2: + 左上
  {side:'top',   pos:0.8, unlock:2},  //      + 右上
  {side:'left',  pos:0.4, unlock:3},  // Lv3: + 左中
  {side:'right', pos:0.4, unlock:3},  //      + 右中
  {side:'left',  pos:0.75,unlock:4},  // Lv4: + 左下
  {side:'right', pos:0.75,unlock:4},  //      + 右下
  {side:'top',   pos:0.35,unlock:5},  // Lv5: + 上の隙間
  {side:'top',   pos:0.65,unlock:5},
];

function pickPortal(){
  const open = PORTALS.filter(p=>p.unlock<=state.level);
  return open[Math.floor(Math.random()*open.length)];
}

function pickType(){
  // 茶（触ると即終了）：Lv2 から たまに、レベルで微増。最大10%。
  const brownChance = state.level >= 2 ? Math.min(0.10, 0.03 + state.level * 0.008) : 0;
  if(Math.random() < brownChance) return 'brown';
  return Math.random() < 0.5 ? 'black' : 'red';
}

function spawnBomb(){
  const p = pickPortal();
  state.bombs.push(new Bomb(pickType(), p.side, p.pos));
  if(state.level >= 5 && Math.random() < 0.30){
    const p2 = pickPortal();
    state.bombs.push(new Bomb(pickType(), p2.side, p2.pos));
  }
  if(state.level >= 9 && Math.random() < 0.25){
    const p3 = pickPortal();
    state.bombs.push(new Bomb(pickType(), p3.side, p3.pos));
  }
}

function spawnParticles(x,y,color,n=18){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2;
    const sp = 2 + Math.random()*5;
    state.particles.push({
      x,y,
      vx: Math.cos(a)*sp,
      vy: Math.sin(a)*sp - 1,
      life: 600 + Math.random()*400,
      max: 1000,
      color,
      r: 2+Math.random()*3,
    });
  }
}

function explode(bomb){
  if(bomb._dead) return;
  spawnParticles(bomb.x, bomb.y, bomb.type==='black' ? '#ffaa33' : '#ff5577', 28);
  state.shake = 18;
  state.flash = 1;
  state.flashColor = '#ffd24a';
  bomb._exploded = true;
  bomb._dead = true;
  setTimeout(endGame, 400);
}

function placeBomb(bomb, zoneKey){
  const correct = (zoneKey==='red' && bomb.type==='red') || (zoneKey==='black' && bomb.type==='black');
  if(correct){
    bomb.state = 'placed';
    bomb.zone = zoneKey;
    bomb.pickTarget(zoneKey==='red' ? RED : BLK);
    state.score = Math.min(9999, state.score + 1);
    spawnParticles(bomb.x, bomb.y, '#ffffaa', 8);
    // 1点ごとに じわっと早くなる
    state.spawnInterval = Math.max(280, state.spawnInterval * 0.96);
    if(state.score % 5 === 0){
      state.level++;
      // レベルでさらに加速＋導火線も短く
      state.spawnInterval = Math.max(280, state.spawnInterval - 90);
    }
  }else{
    // 誤投入：そのゾーンの全ボム＋本体が連鎖爆発
    explode(bomb);
    state.bombs.forEach(b=>{
      if(b._dead) return;
      if(b.state==='placed' && b.zone===zoneKey){
        explode(b);
      }
    });
  }
}

function zoneAt(x,y){
  if(x>=RED.x && x<=RED.x+RED.w && y>=RED.y && y<=RED.y+RED.h) return 'red';
  if(x>=BLK.x && x<=BLK.x+BLK.w && y>=BLK.y && y<=BLK.y+BLK.h) return 'black';
  return null;
}

// ========= 入力 =========
function getPos(e){
  const r = cv.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  const sx = cv.width / r.width;
  const sy = cv.height / r.height;
  return {x:(t.clientX - r.left)*sx, y:(t.clientY - r.top)*sy};
}

function onDown(e){
  if(!state.running) return;
  e.preventDefault();
  const p = getPos(e);
  for(let i=state.bombs.length-1;i>=0;i--){
    const b = state.bombs[i];
    if(b._dead) continue;
    if(b.state==='placed') continue;
    const dx = p.x-b.x, dy = p.y-b.y;
    if(dx*dx+dy*dy <= (b.r+10)*(b.r+10)){
      // 茶ばくだんに触ったら即終了
      if(b.type==='brown'){
        explode(b);
        return;
      }
      state.dragging = b;
      state.dragOffset.x = b.x - p.x;
      state.dragOffset.y = b.y - p.y;
      b.state = 'drag';
      state.bombs.splice(i,1);
      state.bombs.push(b);
      return;
    }
  }
}
function onMove(e){
  if(!state.dragging) return;
  e.preventDefault();
  const p = getPos(e);
  state.dragging.x = p.x + state.dragOffset.x;
  state.dragging.y = p.y + state.dragOffset.y;
}
function onUp(e){
  if(!state.dragging) return;
  e.preventDefault();
  const b = state.dragging;
  state.dragging = null;
  const z = zoneAt(b.x, b.y);
  if(z){
    placeBomb(b, z);
  } else {
    // ゾーン外でリリース → 徘徊に戻す
    b.state = 'wander';
    b.pickTarget(FLOOR);
  }
}
cv.addEventListener('mousedown', onDown);
cv.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
cv.addEventListener('touchstart', onDown, {passive:false});
cv.addEventListener('touchmove', onMove, {passive:false});
window.addEventListener('touchend', onUp, {passive:false});
window.addEventListener('touchcancel', onUp, {passive:false});

// ========= 描画 =========
function drawBg(){
  ctx.fillStyle = '#2a2a36';
  ctx.fillRect(0,0,W,H);
  // フロアタイル
  ctx.strokeStyle = 'rgba(255,255,255,.04)';
  ctx.lineWidth = 1;
  for(let x=0;x<W;x+=24){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=24){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawZones(){
  // あかカーペット
  ctx.fillStyle = RED.color;
  roundRect(RED.x, RED.y, RED.w, RED.h, 10, true, false);
  ctx.strokeStyle = RED.edge; ctx.lineWidth = 3;
  roundRect(RED.x, RED.y, RED.w, RED.h, 10, false, true);
  // くろカーペット
  ctx.fillStyle = BLK.color;
  roundRect(BLK.x, BLK.y, BLK.w, BLK.h, 10, true, false);
  ctx.strokeStyle = BLK.edge; ctx.lineWidth = 3;
  roundRect(BLK.x, BLK.y, BLK.w, BLK.h, 10, false, true);

  // 半透明アイコン
  ctx.save();
  ctx.globalAlpha = .25;
  drawZoneIcon(RED.x+RED.w/2, RED.y+RED.h/2, '#ff5577');
  drawZoneIcon(BLK.x+BLK.w/2, BLK.y+BLK.h/2, '#000');
  ctx.restore();

  // ラベル
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('あか', RED.x+RED.w/2, RED.y+18);
  ctx.fillText('くろ', BLK.x+BLK.w/2, BLK.y+18);
}

function drawZoneIcon(cx,cy,col){
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(cx,cy,30,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillRect(cx-10,cy-3,7,10);
  ctx.fillRect(cx+3 ,cy-3,7,10);
}

function roundRect(x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
  if(fill) ctx.fill();
  if(stroke) ctx.stroke();
}

function drawHud(){
  ctx.fillStyle = 'rgba(0,0,0,.55)';
  ctx.fillRect(0,0,W,HUD_H);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE ${state.score}`, 10, 23);
  ctx.textAlign = 'right';
  ctx.fillText(`Lv.${state.level}`, W-10, 23);
  ctx.textAlign = 'center';
  ctx.font = 'bold 15px system-ui';
  ctx.fillText('ばくだんをわけろ！', W/2, 23);
}

function drawParticles(){
  state.particles.forEach(p=>{
    const a = Math.max(0, p.life / p.max);
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ========= ループ =========
let last = 0;
function loop(t){
  const dt = Math.min(40, t - last); last = t;

  if(state.running){
    state.spawnTimer += dt;
    if(state.spawnTimer >= state.spawnInterval){
      state.spawnTimer = 0;
      spawnBomb();
    }
    state.bombs.forEach(b=>{ if(b.state!=='drag') b.update(dt); });
    state.bombs.forEach(b=>{
      if(b._exploded && !b._dead) explode(b);
    });
    state.bombs = state.bombs.filter(b=>!b._dead);
    state.particles.forEach(p=>{
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.2;
      p.life -= dt;
    });
    state.particles = state.particles.filter(p=>p.life>0);
  }

  ctx.save();
  if(state.shake>0){
    const sx = (Math.random()-0.5)*state.shake;
    const sy = (Math.random()-0.5)*state.shake;
    ctx.translate(sx,sy);
    state.shake *= 0.85;
    if(state.shake<0.5) state.shake = 0;
  }

  drawBg();
  drawZones();
  // 描画順：placed → wander → drag (drag最前面)
  const order = ['placed','wander','enter','drag'];
  state.bombs.slice().sort((a,b)=>order.indexOf(a.state)-order.indexOf(b.state)).forEach(b=>b.draw());
  drawParticles();
  drawHud();

  if(state.flash>0){
    ctx.fillStyle = state.flashColor;
    ctx.globalAlpha = state.flash;
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = 1;
    state.flash *= 0.85;
    if(state.flash<0.02) state.flash = 0;
  }

  ctx.restore();

  requestAnimationFrame(loop);
}

function startGame(){
  state.bombs = [];
  state.particles = [];
  state.score = 0;
  state.level = 1;
  state.spawnInterval = 1600;
  state.spawnTimer = 0;
  state.running = true;
  state.gameOver = false;
  overlay.classList.add('hidden');
  overlay.querySelector('h1').textContent = 'ばくだんをわけろ！';
  overlay.querySelector('button').textContent = 'スタート';
}

function endGame(){
  if(state.gameOver) return;
  state.gameOver = true;
  state.running = false;
  if(state.score > state.best){
    state.best = state.score;
    localStorage.setItem('bomb_best', state.best);
  }
  bestEl.textContent = `さいこう: ${state.best}　／　こんかい: ${state.score}`;
  overlay.querySelector('h1').textContent = 'ばくはつ！';
  overlay.querySelector('button').textContent = 'もういちど';
  overlay.classList.remove('hidden');
}

startBtn.addEventListener('click', startGame);

function fit(){
  const stage = document.getElementById('stage');
  const sw = stage.clientWidth, sh = stage.clientHeight;
  const ratio = W/H;
  let w = sw, h = sw/ratio;
  if(h > sh){ h = sh; w = sh*ratio; }
  cv.style.width = w+'px';
  cv.style.height = h+'px';
}
window.addEventListener('resize', fit);
fit();

requestAnimationFrame(loop);

})();
</script>
</body>
</html>
